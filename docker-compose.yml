services:
  # LINE Bot 主服務
  linebot:
    build: .
    container_name: linebot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 掛載服務帳號金鑰（如果使用 Google Drive）
      - ./credentials.json:/app/credentials.json:ro
      # 快取目錄
      - linebot_cache:/tmp/linebot_cache
      # 臨時圖片目錄（用於 !img 指令）
      - linebot_images:/tmp/linebot_images
    networks:
      - linebot-network
    extra_hosts:
      # 讓容器可以連到 host 上直接跑的 Ollama
      - "host.docker.internal:host-gateway"
    environment:
      # 指向 host 上直接跑的 Ollama（不經過 Docker）
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  # Cloudflare Quick Tunnel（臨時 URL，用於測試）
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://linebot:8000
    depends_on:
      - linebot
    networks:
      - linebot-network

volumes:
  linebot_cache:
    driver: local
  linebot_images:
    driver: local

networks:
  linebot-network:
    driver: bridge
