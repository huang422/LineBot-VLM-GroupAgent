services:
  # LINE Bot 主服務
  linebot:
    build: .
    container_name: linebot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 掛載服務帳號金鑰（如果使用 Google Drive）
      - ./credentials.json:/app/credentials.json:ro
      # 快取目錄
      - linebot_cache:/tmp/linebot_cache
      # 臨時圖片目錄（用於 !img 指令）
      - linebot_images:/tmp/linebot_images
    depends_on:
      - ollama
    networks:
      - linebot-network
    environment:
      # 指向 Docker 內的 Ollama 服務
      - OLLAMA_BASE_URL=http://ollama:11434

  # Ollama 服務（Docker 容器，使用 GPU）
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - linebot-network
    # GPU 環境變數設定
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # 限制 Ollama 最大 VRAM 使用量（10GB），剩餘模型 layers 自動 offload 到 RAM
      # 4080 12GB：10GB 給模型，~2GB 留給 OS/CUDA overhead，避免 OOM
      # qwen3.5:35b-a3b Q4_K_M ~20GB：約 10GB 進 GPU，10GB 進 RAM (需要 32GB)
      # qwen3.5:9b       Q4_K_M ~5GB ：全部進 GPU，速度更快（可調低 OLLAMA_MAX_VRAM）
      # 換模型只需改 .env 的 OLLAMA_MODEL，此 VRAM 設定自動適用任何模型
      - OLLAMA_MAX_VRAM=10737418240
      # Flash Attention：減少 KV cache VRAM 用量，讓更多 model layers 進 GPU，加速 decode
      - OLLAMA_FLASH_ATTENTION=1
    # 使用 nvidia runtime
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    # Cloudflare Quick Tunnel（臨時 URL，用於測試）
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://linebot:8000
    depends_on:
      - linebot
    networks:
      - linebot-network

volumes:
  ollama_data:
    driver: local
  linebot_cache:
    driver: local
  linebot_images:
    driver: local

networks:
  linebot-network:
    driver: bridge
